name: PR Checks

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    name: Lint (ktlint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Restore google-services.json
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "${{ secrets.GOOGLE_SERVICES_DEV }}"  | base64 --decode > app/src/dev/google-services.json
          echo "${{ secrets.GOOGLE_SERVICES_PROD }}" | base64 --decode > app/src/prod/google-services.json

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon --stacktrace

  test-and-coverage:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Restore google-services.json
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "${{ secrets.GOOGLE_SERVICES_DEV }}"  | base64 --decode > app/src/dev/google-services.json
          echo "${{ secrets.GOOGLE_SERVICES_PROD }}" | base64 --decode > app/src/prod/google-services.json

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Run tests & coverage
        run: ./gradlew testDebugUnitTestCoverage --no-daemon --stacktrace

      - name: Post coverage comment on PR
        if: always()
        uses: Madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/testDebugUnitTestCoverage/coverage.xml
          token: ${{ secrets.BOTOMINAS_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 80
          title: '📊 Code Coverage'
          update-comment: true
          pass-emoji: '✅'
          fail-emoji: '❌'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/testDebugUnitTestCoverage/
          retention-days: 7

  ci-gate:
    name: CI Gate
    needs: [lint, test-and-coverage]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check required jobs
        run: |
          lint="${{ needs.lint.result }}"
          tests="${{ needs.test-and-coverage.result }}"
          echo "lint: $lint"
          echo "test-and-coverage: $tests"
          if [[ "$lint" == "failure" || "$lint" == "cancelled" ]]; then
            echo "❌ Lint job failed"
            exit 1
          fi
          if [[ "$tests" == "failure" || "$tests" == "cancelled" ]]; then
            echo "❌ Tests & Coverage job failed"
            exit 1
          fi
          echo "✅ All required checks passed (or were skipped)"
