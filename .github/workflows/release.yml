name: Release CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: write

env:
  PACKAGE_NAME: com.jesuslcorominas.teamflowmanager

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Tests & Lint
  # ─────────────────────────────────────────────────────────────
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect skip-tests flag
        id: skip
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          git fetch origin "$SHA" --depth=1 2>/dev/null || true
          COMMIT_MSG=$(git log -1 --format='%s' "$SHA")
          if echo "$COMMIT_MSG" | grep -q '\[skip-tests\]'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏩ [skip-tests] detected — skipping tests and lint"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v4
        if: steps.skip.outputs.skip != 'true'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Restore google-services.json
        if: steps.skip.outputs.skip != 'true'
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "${{ secrets.GOOGLE_SERVICES_DEV }}"  | base64 --decode > app/src/dev/google-services.json
          echo "${{ secrets.GOOGLE_SERVICES_PROD }}" | base64 --decode > app/src/prod/google-services.json

      - name: Grant gradlew permission
        if: steps.skip.outputs.skip != 'true'
        run: chmod +x gradlew

      - name: Run ktlint
        if: steps.skip.outputs.skip != 'true'
        run: ./gradlew ktlintCheck --no-daemon --stacktrace

      - name: Run tests & coverage
        if: steps.skip.outputs.skip != 'true'
        run: ./gradlew testDebugUnitTestCoverage --no-daemon --stacktrace

      - name: Post coverage comment on PR
        if: steps.skip.outputs.skip != 'true'
        uses: Madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/testDebugUnitTestCoverage/coverage.xml
          token: ${{ secrets.BOTOMINAS_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 80
          title: '📊 Code Coverage'
          update-comment: true
          pass-emoji: '✅'
          fail-emoji: '❌'

      - name: Upload test results
        if: always() && steps.skip.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always() && steps.skip.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/testDebugUnitTestCoverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 2. Validate versionCode not already published
  # ─────────────────────────────────────────────────────────────
  validate-version:
    name: Validate versionCode
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | grep -oP '\d+')
          VERSION_NAME=$(grep -E '^\s+versionName\s*=' app/build.gradle.kts | grep -oP '"[^"]+"' | tr -d '"')
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "versionCode: $VERSION_CODE  versionName: $VERSION_NAME"

      - name: Get Play Store access token
        id: auth
        env:
          SA_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          TOKEN=$(python3 - <<'PYEOF'
          import json, time, base64, os
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import padding
          import urllib.request, urllib.parse

          sa = json.loads(os.environ["SA_JSON"])
          now = int(time.time())

          def b64url(data):
              return base64.urlsafe_b64encode(json.dumps(data, separators=(',',':')).encode()).rstrip(b'=').decode()

          header  = b64url({"alg": "RS256", "typ": "JWT"})
          payload = b64url({"iss": sa["client_email"], "scope": "https://www.googleapis.com/auth/androidpublisher", "aud": "https://oauth2.googleapis.com/token", "iat": now, "exp": now + 3600})
          unsigned = f"{header}.{payload}"

          key = serialization.load_pem_private_key(sa["private_key"].encode(), password=None)
          sig = base64.urlsafe_b64encode(key.sign(unsigned.encode(), padding.PKCS1v15(), hashes.SHA256())).rstrip(b'=').decode()
          jwt = f"{unsigned}.{sig}"

          body = urllib.parse.urlencode({"grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer", "assertion": jwt}).encode()
          resp = json.loads(urllib.request.urlopen(urllib.request.Request("https://oauth2.googleapis.com/token", body)).read())
          print(resp["access_token"])
          PYEOF
          )
          echo "access_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Check versionCode availability
        run: |
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          TOKEN="${{ steps.auth.outputs.access_token }}"
          PKG="${{ env.PACKAGE_NAME }}"

          # Create a temporary edit to list all uploaded bundles
          EDIT_ID=$(curl -s -X POST \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}' | jq -r '.id // empty')

          if [ -z "$EDIT_ID" ]; then
            echo "⚠️ Could not create Play API edit — skipping bundle check"
          else
            BUNDLES=$(curl -s \
              "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT_ID/bundles" \
              -H "Authorization: Bearer $TOKEN")

            # Abort the edit immediately — we only needed it to list bundles
            curl -s -X DELETE \
              "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT_ID" \
              -H "Authorization: Bearer $TOKEN" > /dev/null

            EXISTS=$(echo "$BUNDLES" | jq -r --arg vc "$VERSION_CODE" \
              '[.bundles[]? | .versionCode | tostring] | if any(. == $vc) then "FOUND" else "OK" end' \
              2>/dev/null || echo "OK")

            if [ "$EXISTS" = "FOUND" ]; then
              echo "❌ versionCode $VERSION_CODE is already uploaded to Play Store (bundle exists)."
              echo "   The pre-push hook should have bumped it. Run: bash scripts/install-hooks.sh"
              exit 1
            fi
          fi
          echo "✅ versionCode $VERSION_CODE is available"

  # ─────────────────────────────────────────────────────────────
  # 3. Android — Build AAB & Upload to Play Alpha
  # ─────────────────────────────────────────────────────────────
  android:
    name: Android — Play Alpha
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Restore secrets
        run: |
          mkdir -p app/src/prod
          echo "${{ secrets.GOOGLE_SERVICES_PROD }}" | base64 --decode > app/src/prod/google-services.json
          echo "${{ secrets.KEYSTORE_JKS }}"         | base64 --decode > ${{ github.workspace }}/teamflow.jks

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build signed AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/teamflow.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleProdRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamFlowManager-${{ needs.validate-version.outputs.version_name }}.aab
          path: app/build/outputs/bundle/prodRelease/app-prod-release.aab
          retention-days: 30

      - name: Upload to Google Play Alpha
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: app/build/outputs/bundle/prodRelease/app-prod-release.aab
          track: alpha
          status: completed
          whatsNewDirectory: distribution/whatsnew

  # ─────────────────────────────────────────────────────────────
  # 4. iOS — Build IPA & attach as artifact
  # ─────────────────────────────────────────────────────────────
  ios:
    name: iOS — Build IPA
    needs: validate-version
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore GoogleService-Info plists
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_DEV }}"  | base64 --decode > iosApp/iosApp/GoogleService-Info.plist
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PROD }}" | base64 --decode > iosApp/iosApp/GoogleService-Info-Prod.plist

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods dependencies
        working-directory: iosApp
        run: pod install

      - name: Import Distribution Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASS=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates

      - name: Export IPA (ad-hoc)
        run: |
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '  <key>method</key>' \
            '  <string>ad-hoc</string>' \
            '  <key>teamID</key>' \
            '  <string>KVA2CL6TMG</string>' \
            '  <key>compileBitcode</key>' \
            '  <false/>' \
            '</dict>' \
            '</plist>' > "$RUNNER_TEMP/ExportOptions.plist"
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamFlowManager-iOS-${{ needs.validate-version.outputs.version_name }}.ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # 5. Notify PR on failure
  # ─────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify failure
    runs-on: ubuntu-latest
    needs: [test, validate-version, android]
    if: failure()
    steps:
      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.BOTOMINAS_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo ${{ github.repository }} \
            --head ${{ github.head_ref }} \
            --base main \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found — skipping comment"
            exit 0
          fi

          JOBS=$(gh run view ${{ github.run_id }} \
            --repo ${{ github.repository }} \
            --json jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | "- **\(.name)**: \(.steps[] | select(.conclusion == "failure") | .name)"] | join("\n")')

          LOGS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh pr comment "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --body "$(printf '❌ **Release CI failed** (build ${{ github.run_number }})\n\n**Jobs fallidos:**\n%s\n\n[Ver logs completos](%s)' "$JOBS" "$LOGS_URL")"
