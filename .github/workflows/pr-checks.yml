name: PR Checks

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test-lint-coverage:
    name: Tests, Lint & Coverage
    # Skip PRs from main (sync after release merge — no new code to cover)
    if: github.head_ref != 'main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Restore google-services.json
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "${{ secrets.GOOGLE_SERVICES_DEV }}"  | base64 --decode > app/src/dev/google-services.json
          echo "${{ secrets.GOOGLE_SERVICES_PROD }}" | base64 --decode > app/src/prod/google-services.json

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon --stacktrace

      - name: Generate coverage report
        run: ./gradlew testDebugUnitTestCoverage --no-daemon --stacktrace

      - name: Post coverage comment on PR
        uses: Madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/testDebugUnitTestCoverage/coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 80
          title: '📊 Code Coverage'
          update-comment: true
          pass-emoji: '✅'
          fail-emoji: '❌'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/testDebugUnitTestCoverage/
          retention-days: 7
